name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UPX
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --release-notes .release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCOOP_BUCKET_PAT: ${{ secrets.SCOOP_BUCKET_PAT }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Ensure release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -f .release-notes.md ]; then
            gh release edit "$TAG" --notes-file .release-notes.md
          fi

      - name: Notify webhooks on release
        if: success()
        env:
          RELEASE_WEBHOOK_URL: ${{ secrets.RELEASE_WEBHOOK_URL }}
          TEAMS_RELEASE_WEBHOOK_URL: ${{ secrets.TEAMS_RELEASE_WEBHOOK_URL }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REPO="${GITHUB_REPOSITORY}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"

          CHANGELOG=""
          if [ -f .release-notes.md ]; then
            # Read up to 30 lines and collapse newlines; jq handles all JSON escaping below
            CHANGELOG=$(head -30 .release-notes.md | tr '\n' ' ')
          fi

          # Use jq to construct the JSON payload so all control characters are safely escaped
          PAYLOAD=$(jq -n \
            --arg event "release_published" \
            --arg version "${TAG}" \
            --arg tag "${TAG}" \
            --arg release_url "${RELEASE_URL}" \
            --arg changelog "${CHANGELOG}" \
            '{"event":$event,"version":$version,"tag":$tag,"release_url":$release_url,"changelog_summary":$changelog}')

          # Send to generic JSON webhook (Hytte dashboard, Slack, custom receivers)
          if [ -n "${RELEASE_WEBHOOK_URL}" ]; then
            curl -sf -X POST "${RELEASE_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              --data-binary "${PAYLOAD}" \
              && echo "Notified RELEASE_WEBHOOK_URL (${TAG})" \
              || echo "Warning: RELEASE_WEBHOOK_URL notification failed (non-fatal)"
          fi

          # Send to Teams webhook (also accepts generic JSON via Incoming Webhook connector)
          if [ -n "${TEAMS_RELEASE_WEBHOOK_URL}" ]; then
            curl -sf -X POST "${TEAMS_RELEASE_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              --data-binary "${PAYLOAD}" \
              && echo "Notified Teams webhook (${TAG})" \
              || echo "Warning: Teams webhook notification failed (non-fatal)"
          fi
