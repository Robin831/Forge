name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --release-notes .release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCOOP_BUCKET_PAT: ${{ secrets.SCOOP_BUCKET_PAT }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Ensure release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -f .release-notes.md ]; then
            gh release edit "$TAG" --notes-file .release-notes.md
          fi

      - name: Notify webhooks on release
        if: success()
        env:
          RELEASE_WEBHOOK_URL: ${{ secrets.RELEASE_WEBHOOK_URL }}
          TEAMS_RELEASE_WEBHOOK_URL: ${{ secrets.TEAMS_RELEASE_WEBHOOK_URL }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REPO="${GITHUB_REPOSITORY}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"

          CHANGELOG=""
          if [ -f .release-notes.md ]; then
            # Read up to 30 lines, collapse newlines, escape JSON special chars
            CHANGELOG=$(head -30 .release-notes.md | tr '\n' ' ' | sed 's/\\/\\\\/g; s/"/\\"/g')
          fi

          # Generic JSON payload consumed by custom receivers (dashboards, bots, etc.)
          PAYLOAD=$(printf '{"event":"release_published","version":"%s","tag":"%s","release_url":"%s","changelog_summary":"%s"}' \
            "${TAG}" "${TAG}" "${RELEASE_URL}" "${CHANGELOG}")

          # Send to generic JSON webhook (Hytte dashboard, Slack, custom receivers)
          if [ -n "${RELEASE_WEBHOOK_URL}" ]; then
            curl -sf -X POST "${RELEASE_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              --data-binary "${PAYLOAD}" \
              && echo "Notified RELEASE_WEBHOOK_URL (${TAG})" \
              || echo "Warning: RELEASE_WEBHOOK_URL notification failed (non-fatal)"
          fi

          # Send to Teams webhook (also accepts generic JSON via Incoming Webhook connector)
          if [ -n "${TEAMS_RELEASE_WEBHOOK_URL}" ]; then
            curl -sf -X POST "${TEAMS_RELEASE_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              --data-binary "${PAYLOAD}" \
              && echo "Notified Teams webhook (${TAG})" \
              || echo "Warning: Teams webhook notification failed (non-fatal)"
          fi
