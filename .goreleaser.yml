version: 2

project_name: forge

before:
  hooks:
    - go mod tidy

builds:
  - id: forge
    main: ./cmd/forge
    binary: forge
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/Robin831/Forge/internal/forge.Version={{.Version}}
      - -X github.com/Robin831/Forge/internal/forge.Build={{.ShortCommit}}
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  skip: true

release:
  github:
    owner: Robin831
    name: Forge
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
