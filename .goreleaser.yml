version: 2

project_name: forge

before:
  hooks:
    - go mod tidy

builds:
  - id: forge
    main: ./cmd/forge
    binary: forge
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/Robin831/Forge/internal/forge.Version={{.Version}}
      - -X github.com/Robin831/Forge/internal/forge.Build={{.ShortCommit}}
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

release:
  github:
    owner: Robin831
    name: Forge
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  body_template: |
    ## Installation

    ### Linux & macOS (one-liner)

    ```bash
    curl -fsSL https://raw.githubusercontent.com/Robin831/Forge/main/install.sh | bash
    ```

    To install a specific version:

    ```bash
    curl -fsSL https://raw.githubusercontent.com/Robin831/Forge/main/install.sh | VERSION={{.Tag}} bash
    ```

    ### Windows

    Download the `forge_{{.Version}}_windows_amd64.zip` asset below and extract `forge.exe` to a directory on your `%PATH%`.

    ---
    **Checksums** are in `checksums.txt`.
