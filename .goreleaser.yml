version: 2

project_name: forge

before:
  hooks:
    - go mod tidy

builds:
  - id: forge
    main: ./cmd/forge
    binary: forge
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/Robin831/Forge/internal/forge.Version={{.Version}}
      - -X github.com/Robin831/Forge/internal/forge.Build={{.ShortCommit}}
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

upx:
  - ids: [forge]
    enabled: true
    compress: best
    brute: true
    goos:
      - linux
      - windows

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
      - goos: darwin
        format: tar.gz
      - goos: linux
        format: tar.gz

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

scoops:
  - repository:
      owner: Robin831
      name: scoop-forge
      token: "{{ .Env.SCOOP_BUCKET_PAT }}"
    homepage: https://github.com/Robin831/Forge
    description: Autonomous AI orchestrator that coordinates Claude Code agents across git repositories
    license: MIT
    skip_upload: auto

brews:
  - name: forge
    repository:
      owner: Robin831
      name: homebrew-forge
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/Robin831/Forge"
    description: "Autonomous AI orchestrator for multi-repo development"
    license: "MIT"
    skip_upload: auto
    install: |
      bin.install "forge"
    test: |
      system "#{bin}/forge", "version"

dockers:
  - id: forge-amd64
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/robin831/forge:{{ .Tag }}-amd64"
      - "ghcr.io/robin831/forge:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Autonomous AI orchestrator for multi-repo development"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/Robin831/Forge"
      - "--label=org.opencontainers.image.licenses=MIT"
    dockerfile: Dockerfile
    use: buildx

  - id: forge-arm64
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/robin831/forge:{{ .Tag }}-arm64"
      - "ghcr.io/robin831/forge:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Autonomous AI orchestrator for multi-repo development"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/Robin831/Forge"
      - "--label=org.opencontainers.image.licenses=MIT"
    dockerfile: Dockerfile
    use: buildx

docker_manifests:
  - name_template: "ghcr.io/robin831/forge:{{ .Tag }}"
    image_templates:
      - "ghcr.io/robin831/forge:{{ .Tag }}-amd64"
      - "ghcr.io/robin831/forge:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/robin831/forge:latest"
    image_templates:
      - "ghcr.io/robin831/forge:latest-amd64"
      - "ghcr.io/robin831/forge:latest-arm64"

release:
  github:
    owner: Robin831
    name: Forge
  draft: false
  prerelease: auto
  replace_existing_draft: true
  replace_existing_artifacts: true
  name_template: "v{{.Version}}"
